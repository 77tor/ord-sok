<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Norsk Ordsøk-Generator</title>
    <link rel="icon" type="image/png" href="ord-sok.png">
    <link rel="apple-touch-icon" href="ord-sok.png">
    <style>
        @font-face {
            font-family: 'Skogstavskrift';
            src: url('skogstavskrift.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
        }
@font-face {
    font-family: 'Trykkskrift';
    src: url('trykkskrift.otf') format('opentype');
    font-weight: normal;
    font-style: normal;
}

        @import url('https://fonts.googleapis.com/css2?family=Andika&display=swap');

        body { font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; background-color: #f0f2f5; padding: 20px; }
        
        .header-container { display: flex; align-items: center; gap: 15px; margin-bottom: 10px; }
        .header-container img { height: 60px; width: auto; }
        .header-container h1 { margin: 0; }

        .controls { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; width: 500px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #333; font-size: 14px; }
        textarea { width: 100%; height: 80px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 4px; padding: 8px; box-sizing: border-box; resize: vertical; }
        select, input { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        
        .button-group { display: flex; gap: 10px; }
        button { flex: 1; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; }
        .btn-generate { background-color: #28a745; color: white; }
        .btn-print { background-color: #007bff; color: white; }
        
        .grid-wrapper { display: flex; flex-direction: column; align-items: center; }
        .grid-container { 
            display: grid; 
            background: white; 
            padding: 15px; 
            border: 3px solid #333; 
            margin-top: 20px; 
            box-shadow: 0 0 20px rgba(0,0,0,0.05);
            width: fit-content;
        }
        
        .cell { 
            border: 1px solid #eee; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-weight: normal;
            color: #000;
            box-sizing: border-box;
        }

        /* Styling for fasit-bokstaver */
        .cell.solution { background-color: #e8f5e9; font-weight: bold; color: #28a745; }
        .cell.empty { color: #ccc; }
        
        #word-list-container { margin-top: 20px; text-align: center; max-width: 600px; }
        #word-list { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; margin-top: 10px; }
        .word-item { background: #fff; padding: 8px 12px; border: 1px solid #ddd; border-radius: 4px; }
        
        .solution-section { margin-top: 50px; display: none; border-top: 2px dashed #ccc; padding-top: 30px; width: 100%; flex-direction: column; align-items: center; }

        @media print {
            .controls, .header-container { display: none; }
            body { background-color: white !important; background: white !important; padding: 0; }
            .grid-container { border: 2px solid black; box-shadow: none; margin: 0 auto; max-width: 18cm; }
            .word-item { background: white !important; border: 1px solid #000; }
            .solution-section { page-break-before: always; border-top: none; }
            .cell.solution { background-color: transparent !important; color: black !important; border: 2px solid #28a745 !important; }
        }
    </style>
</head>
<body>

    <div class="header-container">
        <img src="ord_sok_01.png" alt="Logo">
        <h1>Ordsøk-Generator</h1>
<img src="ord_sok_01.png" alt="Logo">
    </div>

    <div class="controls">
        <label>Ordliste:</label>
        <textarea id="word-input" placeholder="Eks: lære, lese, skrive, skole"></textarea>
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <div>
                <label>Størrelse (5-25):</label>
                <input type="number" id="grid-size" value="12" min="5" max="25">
            </div>
            <div>
                <label>Bokstavtype:</label>
                <select id="case-style">
                    <option value="lower">små bokstaver</option>
                    <option value="upper">STORE BOKSTAVER</option>
                </select>
            </div>
            <div>
                <label>Velg Font:</label>
                <select id="font-family">
                    <option value="'Trykkskrift', sans-serif">Trykkskrift</option>
                    <option value="'Skogstavskrift', cursive">Skogstavskrift</option>
                    <option value="'Andika', sans-serif">Andika</option>
                    <option value="'Courier New', Courier, monospace">Monospace</option>
                    <option value="'Comic Sans MS', cursive">Comic Sans</option>
                    <option value="Arial, sans-serif">Arial</option>
                </select>
            </div>
            <div>
                <label>Retning:</label>
                <select id="placement-style">
                    <option value="all">Alle (H, V, D)</option>
                    <option value="horizontal">Kun Vannrett</option>
                    <option value="vertical">Kun Loddrett</option>
                    <option value="diagonal">Kun Diagonalt</option>
                </select>
            </div>
            <div>
                <label>Leseretning:</label>
                <select id="read-direction">
                    <option value="normal">Kun venstre mot høyre</option>
                    <option value="both">Valgfritt (begge veier)</option>
                </select>
            </div>
            <div>
                <label>Inkluder fasit?</label>
                <select id="show-solution">
                    <option value="no">Kun ordsøk</option>
                    <option value="yes">Ordsøk og fasit</option>
                </select>
            </div>
        </div>
        
        <div class="button-group">
            <button class="btn-generate" onclick="generatePuzzle()">Lag Ordsøk</button>
            <button class="btn-print" onclick="window.print()">Skriv ut</button>
        </div>
    </div>

    <div class="grid-wrapper">
        <div id="grid" class="grid-container"></div>
        <div id="word-list-container">
            <h3>Finn disse ordene:</h3>
            <div id="word-list"></div>
        </div>
    </div>

    <div id="solution-section" class="solution-section">
        <h2>Fasit</h2>
        <div id="solution-grid" class="grid-container"></div>
    </div>

    <script>
        const ALPHA_UPPER = "ABCDEFGHIJKLMNOPQRSTUVWXYZÆØÅ";
        const ALPHA_LOWER = "abcdefghijklmnopqrstuvwxyzæøå";

        function generatePuzzle() {
            const rawInput = document.getElementById('word-input').value;
            let size = parseInt(document.getElementById('grid-size').value);
            
            if (size > 25) { size = 25; document.getElementById('grid-size').value = 25; }
            if (size < 5) { size = 5; document.getElementById('grid-size').value = 5; }

            const caseStyle = document.getElementById('case-style').value;
            const selectedFont = document.getElementById('font-family').value;
            const placementStyle = document.getElementById('placement-style').value;
            const readDirection = document.getElementById('read-direction').value;
            const includeSolution = document.getElementById('show-solution').value === 'yes';
            
            const gridElement = document.getElementById('grid');
            const solutionGridElement = document.getElementById('solution-grid');
            const wordListElement = document.getElementById('word-list');
            const solutionSection = document.getElementById('solution-section');
            
            let words = rawInput.split(/[\s,]+/).filter(w => w.length > 0)
                                .map(w => caseStyle === 'upper' ? w.toUpperCase() : w.toLowerCase());

            if (words.length === 0) return;

            // Opprett rutenett (fylt med tomme strenger)
            let grid = Array(size).fill().map(() => Array(size).fill(''));
            let solutionMask = Array(size).fill().map(() => Array(size).fill(false));

            words.forEach(word => {
                let wordToPlace = (readDirection === 'both' && Math.random() > 0.5) 
                    ? word.split('').reverse().join('') : word;

                let placed = false;
                let attempts = 0;
                while (!placed && attempts < 200) {
                    let dir;
                    if (placementStyle === 'horizontal') dir = 0;
                    else if (placementStyle === 'vertical') dir = 1;
                    else if (placementStyle === 'diagonal') dir = 2;
                    else dir = Math.floor(Math.random() * 3);

                    let r = Math.floor(Math.random() * size);
                    let c = Math.floor(Math.random() * size);
                    
                    if (canPlace(grid, wordToPlace, r, c, dir, size)) {
                        placeWord(grid, solutionMask, wordToPlace, r, c, dir);
                        placed = true;
                    }
                    attempts++;
                }
            });

            // Lag selve visningen
            const maxGridWidth = 650; 
            const cellSize = Math.min(42, Math.floor(maxGridWidth / size));
            const dynamicFontSize = Math.floor(cellSize * 0.65);
            const activeAlphabet = caseStyle === 'upper' ? ALPHA_UPPER : ALPHA_LOWER;

            // Tegn hovedbrettet
            gridElement.style.gridTemplateColumns = `repeat(${size}, ${cellSize}px)`;
            gridElement.innerHTML = '';
            
            // Tegn fasitbrettet
            solutionGridElement.style.gridTemplateColumns = `repeat(${size}, ${cellSize}px)`;
            solutionGridElement.innerHTML = '';

            for (let r = 0; r < size; r++) {
                for (let c = 0; c < size; c++) {
                    const isOccupied = grid[r][c] !== '';
                    const char = isOccupied ? grid[r][c] : activeAlphabet[Math.floor(Math.random() * activeAlphabet.length)];
                    
                    // Legg til i vanlig grid
                    let cell = createCell(char, cellSize, dynamicFontSize, selectedFont);
                    gridElement.appendChild(cell);

                    // Legg til i fasit grid
                    let solCell = createCell(char, cellSize, dynamicFontSize, selectedFont);
                    if (isOccupied) {
                        solCell.classList.add('solution');
                    } else {
                        solCell.classList.add('empty');
                    }
                    solutionGridElement.appendChild(solCell);
                }
            }

            wordListElement.style.fontFamily = selectedFont;
            wordListElement.innerHTML = words.map(w => `<span class="word-item">${w}</span>`).join('');
            
            solutionSection.style.display = includeSolution ? 'flex' : 'none';
        }

        function createCell(char, size, fontSize, font) {
            let cell = document.createElement('div');
            cell.className = 'cell';
            cell.style.width = size + "px";
            cell.style.height = size + "px";
            cell.style.fontFamily = font;
            cell.style.fontSize = fontSize + "px";
            cell.textContent = char;
            return cell;
        }

        function canPlace(grid, word, row, col, dir, size) {
            let dr = [0, 1, 1][dir]; 
            let dc = [1, 0, 1][dir]; 
            if (row + dr * (word.length - 1) >= size || col + dc * (word.length - 1) >= size) return false;
            for (let i = 0; i < word.length; i++) {
                let r = row + i * dr;
                let c = col + i * dc;
                if (grid[r][c] !== '' && grid[r][c] !== word[i]) return false;
            }
            return true;
        }

        function placeWord(grid, mask, word, row, col, dir) {
            let dr = [0, 1, 1][dir];
            let dc = [1, 0, 1][dir];
            for (let i = 0; i < word.length; i++) {
                let r = row + i * dr;
                let c = col + i * dc;
                grid[r][c] = word[i];
                mask[r][c] = true;
            }
        }
    </script>
</body>
</html>
