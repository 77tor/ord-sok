<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ordsøk</title>
    <link rel="icon" type="image/png" href="ord-sok.png">
    <link rel="apple-touch-icon" href="ord-sok.png"
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        /* FONTS */
        @font-face {
            font-family: 'Skogstavskrift';
            src: url('skogstavskrift.otf') format('opentype');
            font-weight: normal; font-style: normal;
        }
        @font-face {
            font-family: 'Trykkskrift';
            src: url('trykkskrift.otf') format('opentype');
            font-weight: normal; font-style: normal;
        }
        @import url('https://fonts.googleapis.com/css2?family=Andika&display=swap');

        :root {
            --sidebar-bg: #1e293b;
            --sidebar-text: #ffffff;
            --main-bg: #f0f2f5;
            --btn-generate: #10b981;
            --btn-reset: #ff7675;
            --btn-print: #3b82f6;
            --btn-download: #9b59b6;
            --sidebar-item-bg: rgba(255, 255, 255, 0.1);
            --grid-border: #333;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            margin: 0; display: flex; height: 100vh; 
            background-color: var(--main-bg); 
        }

        .sidebar {
            width: 350px; background-color: var(--sidebar-bg); color: var(--sidebar-text);
            padding: 20px; box-sizing: border-box; display: flex; flex-direction: column;
            box-shadow: 4px 0 15px rgba(0,0,0,0.3); z-index: 10; overflow-y: auto;
        }

        .sidebar-logo {
            width: 100%; display: flex; justify-content: center;
            margin-bottom: 20px; padding-bottom: 15px; border-top: 1px solid rgba(255,255,255,0.1);
        }
        .sidebar-logo img { max-width: 100px; height: auto; }

        textarea { 
            width: 100%; height: 120px; padding: 12px; border-radius: 8px; border: none; 
            margin-bottom: 20px; background-color: #ecf0f1; font-family: inherit; resize: none;
            box-sizing: border-box; display: block;
        }

        .control-item {
            display: flex; align-items: center; justify-content: space-between;
            background: var(--sidebar-item-bg); padding: 10px 12px; border-radius: 8px; 
            margin-bottom: 8px; font-size: 0.9rem;
        }

        .switch { position: relative; display: inline-block; width: 40px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { 
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; 
            background-color: #ccc; transition: .4s; border-radius: 20px; 
        }
        .slider:before { 
            position: absolute; content: ""; height: 14px; width: 14px; 
            left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; 
        }
        input:checked + .slider { background-color: var(--btn-generate); }
        input:checked + .slider:before { transform: translateX(20px); }

        select, input[type="number"] {
            background: #ecf0f1; border: none; border-radius: 4px; padding: 4px; font-size: 0.85rem; width: 90px;
        }

        .action-btn { 
            width: 100%; padding: 12px; border-radius: 8px; border: none; 
            font-weight: 600; cursor: pointer; margin-bottom: 8px; color: white; transition: 0.2s;
            box-sizing: border-box;
        }
        .action-btn:hover { filter: brightness(1.1); transform: translateY(-1px); }
        
        .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 5px; }
        
        .btn-generate { background-color: var(--btn-generate); margin-top: 10px; }
        .btn-reset { background-color: var(--btn-reset); }
        .btn-print { background-color: var(--btn-print); }
        .btn-download { background-color: var(--btn-download); }

        .main-content { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; align-items: center; padding: 40px; }
        #capture-area { background: white; padding: 40px; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); width: fit-content; }
        
        .grid-container { 
            display: grid; 
            background: white; 
            margin-top: 20px; 
            border: 2px solid var(--grid-border); 
            padding: 0;
            width: fit-content;
        }

        .cell { 
            border: 0.5px solid #ddd; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            user-select: none;
            box-sizing: border-box;
        }

        .cell.solution { background-color: #e8f5e9; font-weight: bold; color: #10b981; border: 0.5px solid #10b981; }
        .cell.empty { color: #ccc; }

        .word-item { background: #f8f9fa; padding: 6px 12px; border: 1px solid #ddd; border-radius: 4px; margin: 5px; display: inline-block; font-size: 1rem; }

        .solution-section {
            margin-top: 40px;
            display: none;
            flex-direction: column;
            align-items: center;
            width: 100%;
            page-break-before: always;
        }

        @media print {
            .sidebar { display: none !important; }
            body { background: white !important; height: auto; }
            .main-content { padding: 0; }
            #capture-area { box-shadow: none !important; padding: 20px; }
        }
    </style>
</head>
<body>

<div class="sidebar">
    
    
    <textarea id="word-input" placeholder="Skriv ord her..."></textarea>

    <div class="sidebar-controls">
        <div class="control-item">
            <span>Størrelse (5-25)</span>
            <input type="number" id="grid-size" value="12" min="5" max="25" onchange="autoGenerate()">
        </div>

        <div class="control-item">
            <span>Font</span>
            <select id="font-family" onchange="autoGenerate()">
                    <option value="'Trykkskrift', sans-serif">Trykkskrift</option>
                    <option value="'Skogstavskrift', cursive">Skogstavskrift</option>
                    <option value="'Andika', sans-serif">Andika</option>
                    <option value="'Courier New', Courier, monospace">Monospace</option>
                    <option value="'Comic Sans MS', cursive">Comic Sans</option>
                    <option value="Arial, sans-serif">Arial</option>
            </select>
        </div>

        <div class="control-item">
            <span>Retning</span>
            <select id="placement-style" onchange="autoGenerate()">
                <option value="all">Alle veier</option>
                <option value="horizontal">Vannrett</option>
                <option value="vertical">Loddrett</option>
            </select>
        </div>

        <div class="control-item">
            <span>STORE bokstaver</span>
            <label class="switch">
                <input type="checkbox" id="toggle-case" onchange="autoGenerate()">
                <span class="slider"></span>
            </label>
        </div>

        <div class="control-item">
            <span>Begge leseretninger</span>
            <label class="switch">
                <input type="checkbox" id="toggle-direction" onchange="autoGenerate()">
                <span class="slider"></span>
            </label>
        </div>

        <div class="control-item">
            <span>Vis fasit</span>
            <label class="switch">
                <input type="checkbox" id="toggle-solution" onchange="autoGenerate()">
                <span class="slider"></span>
            </label>
        </div>
    </div>

    <div style="margin-top: 10px;">
        <button class="action-btn btn-generate" onclick="generatePuzzle()">LAG ORDSØK</button>
        <button class="action-btn btn-reset" onclick="resetForm()">NULLSTILL</button>
        
        <div class="btn-row">
            <button class="action-btn btn-print" onclick="window.print()">SKRIV UT</button>
            <button class="action-btn btn-download" onclick="downloadFullImage()">LAST NED BILDE</button>
        </div>
    </div>
<div class="sidebar-logo"><img src="ord_sok_01.png" alt="Logo"></div>
</div>

<div class="main-content">
    <div id="placeholder-image" style="display: flex; justify-content: center; align-items: center; width: 100%; height: 100%;">
        <img src="ord_sok_01.png" alt="Velkomstbilde" style="max-width: 400px; opacity: 0.3; filter: grayscale(100%);">
    </div>

    <div id="capture-area" style="display: none;">
        <div id="grid" class="grid-container"></div>
        <div id="word-list-container" style="margin-top:20px; text-align:center;">
            <h3 id="list-header">Finn disse ordene:</h3>
            <div id="word-list"></div>
        </div>
    </div>

    <div id="solution-section" class="solution-section" style="display: none;">
        <h2 style="text-align: center; margin-bottom: 20px;">Fasit</h2>
        <div id="solution-grid" class="grid-container"></div>
    </div>
</div>

<script>
    const ALPHA_UPPER = "ABCDEFGHIJKLMNOPQRSTUVWXYZÆØÅ";
    const ALPHA_LOWER = "abcdefghijklmnopqrstuvwxyzæøå";

    function autoGenerate() {
        const input = document.getElementById('word-input').value.trim();
        if (input.length > 0) generatePuzzle();
    }

    function resetForm() { 
        if(confirm("Nullstille alt?")) {
            document.getElementById('word-input').value = "";
            document.getElementById('placeholder-image').style.display = 'flex';
            document.getElementById('capture-area').style.display = 'none';
            document.getElementById('solution-section').style.display = 'none';
        }
    }

async function downloadFullImage() {
        const area = document.getElementById('capture-area');
        const btn = document.querySelector('.btn-download');
        
        // Sjekk om det faktisk er noe å laste ned
        if (document.getElementById('grid').innerHTML === "") {
            alert("Du må generere et ordsøk først!");
            return;
        }

        btn.innerText = "GENERERER...";
        btn.disabled = true;

        try {
            const canvas = await html2canvas(area, {
                scale: 2,
                backgroundColor: "#ffffff",
                logging: false,
                useCORS: true // Lagt til for å håndtere bilder fra andre domener om nødvendig
            });
            
            const link = document.createElement('a');
            link.download = 'ordsok_oppgave.png';
            link.href = canvas.toDataURL('image/png'); // Her var feilen (toDataURL, ikke toURL)
            link.click();
        } catch (e) {
            console.error(e);
            alert("Kunne ikke generere bilde. Prøv en annen nettleser.");
        } finally {
            btn.innerText = "LAST NED BILDE";
            btn.disabled = false;
        }
    }

    function generatePuzzle() {
        // VISNING: Skjul bilde og vis oppgaveområde
        document.getElementById('placeholder-image').style.display = 'none';
        document.getElementById('capture-area').style.display = 'block';
        
        const rawInput = document.getElementById('word-input').value;
        let size = parseInt(document.getElementById('grid-size').value) || 12;
        
        const isUpper = document.getElementById('toggle-case').checked;
        const bothDirections = document.getElementById('toggle-direction').checked;
        const showSolution = document.getElementById('toggle-solution').checked;
        const selectedFont = document.getElementById('font-family').value;
        const placementStyle = document.getElementById('placement-style').value;
        
        // Splitter på komma og linjeskift
        let words = rawInput.split(/[\s,]+/).filter(w => w.length > 0)
                            .map(w => isUpper ? w.toUpperCase() : w.toLowerCase());

        if (words.length === 0) return;

        let grid = Array(size).fill().map(() => Array(size).fill(''));

        words.forEach(word => {
            let wordToPlace = (bothDirections && Math.random() > 0.5) 
                ? word.split('').reverse().join('') : word;

            let placed = false;
            let attempts = 0;
            while (!placed && attempts < 400) {
                let dir = (placementStyle === 'horizontal') ? 0 : (placementStyle === 'vertical' ? 1 : Math.floor(Math.random() * 3));
                let r = Math.floor(Math.random() * size), c = Math.floor(Math.random() * size);
                if (canPlace(grid, wordToPlace, r, c, dir, size)) {
                    placeWord(grid, wordToPlace, r, c, dir);
                    placed = true;
                }
                attempts++;
            }
        });

        const cellSize = Math.min(40, Math.floor(580 / size));
        const activeAlphabet = isUpper ? ALPHA_UPPER : ALPHA_LOWER;

        document.getElementById('list-header').style.fontFamily = selectedFont;
        renderGrid('grid', grid, cellSize, selectedFont, false, activeAlphabet);
        renderGrid('solution-grid', grid, cellSize, selectedFont, true, activeAlphabet);

        document.getElementById('word-list').innerHTML = words.map(w => `<span class="word-item" style="font-family:${selectedFont}">${w}</span>`).join('');
        document.getElementById('solution-section').style.display = showSolution ? 'flex' : 'none';
    }

    function renderGrid(id, grid, size, font, isSolution, alphabet) {
        const el = document.getElementById(id);
        el.style.gridTemplateColumns = `repeat(${grid.length}, ${size}px)`;
        el.innerHTML = '';
        for (let r = 0; r < grid.length; r++) {
            for (let c = 0; c < grid.length; c++) {
                let cell = document.createElement('div');
                cell.className = 'cell';
                const isOccupied = grid[r][c] !== '';
                cell.textContent = isOccupied ? grid[r][c] : alphabet[Math.floor(Math.random() * alphabet.length)];
                if (isSolution && isOccupied) cell.classList.add('solution');
                if (isSolution && !isOccupied) cell.classList.add('empty');
                cell.style.width = cell.style.height = size + "px";
                cell.style.fontFamily = font;
                cell.style.fontSize = (size * 0.6) + "px";
                el.appendChild(cell);
            }
        }
    }

    function canPlace(grid, word, row, col, dir, size) {
        let dr = [0, 1, 1][dir], dc = [1, 0, 1][dir];
        if (row + dr * (word.length - 1) >= size || col + dc * (word.length - 1) >= size) return false;
        for (let i = 0; i < word.length; i++) {
            let r = row + i * dr, c = col + i * dc;
            if (grid[r][c] !== '' && grid[r][c] !== word[i]) return false;
        }
        return true;
    }

    function placeWord(grid, word, row, col, dir) {
        let dr = [0, 1, 1][dir], dc = [1, 0, 1][dir];
        for (let i = 0; i < word.length; i++) grid[row + i * dr][col + i * dc] = word[i];
    }
</script>
</body>
</html>
