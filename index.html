<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ordsøk</title>
    <link rel="icon" type="image/png" href="ord-sok.png">
    <link rel="apple-touch-icon" href="ord-sok.png">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
@font-face {
        font-family: 'Skogstavskrift';
        src: url('skogstavskrift.otf') format('opentype');
        font-weight: normal; font-style: normal;
    }
    @font-face {
        font-family: 'Trykkskrift';
        src: url('trykkskrift.otf') format('opentype');
        font-weight: normal; font-style: normal;
    }
    @import url('https://fonts.googleapis.com/css2?family=Andika&display=swap');

    /* OPPDATERTE VARIABLER SOM MATCHER GITTER */
    :root {
        --vokal-farge: #ffcccc; 
        --vokal-tekst: #e74c3c;
        --konsonant-tekst: #2c3e50;
        --konsonant-overskrift: #2980b9;
        --alt-match: #27ae60;
        --sidebar-bg: #243447;  /* Matchet med Gitter */
        --item-bg: #2c3e50;      /* Matchet med Gitter */
        --accent-green: #27ae60; /* Matchet med Gitter */
        --sidebar-text: #ffffff;
        --main-bg: #f0f2f5;
        
        /* Spesifikke knapper for Ordsøk som nå følger paletten */
        --btn-generate: var(--accent-green);
        --btn-reset: #ff7675;    /* Matchet vokal-tekst for rød farge */
        --btn-print: #2980b9;    /* Matchet konsonant-overskrift for blå farge */
        --btn-download: #9b59b6; /* En lilla som passer inn i stilen */
        --grid-border: #333;
    }

    body { 
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        margin: 0; 
        display: flex; 
        height: 100vh; 
        background-color: var(--main-bg); 
        color: #333;
    }

    /* SIDEBAR - Oppdatert til Gitter-standard */
    .sidebar {
        width: 350px; 
        min-width: 350px; 
        background-color: var(--sidebar-bg); 
        color: var(--sidebar-text);
        padding: 15px; 
        box-sizing: border-box; 
        display: flex; 
        flex-direction: column;
        box-shadow: 4px 0 15px rgba(0,0,0,0.3); 
        z-index: 10; 
        overflow-y: auto;
        max-height: 100vh;
    }

    .sidebar-logo {
        width: 100%; 
        display: flex; 
        justify-content: center;
        margin-bottom: 20px; 
        padding-bottom: 15px; 
        border-bottom: 1px solid rgba(255,255,255,0.1); /* Endret fra top til bottom for Gitter-stil */
    }
    
    .sidebar-logo img { 
        max-width: 100px; 
        height: auto; 
        border-radius: 4px;
    }

    .sidebar h2 { 
        margin: 0 0 15px 0; 
        font-size: 1.1rem; 
        text-align: center; 
        text-transform: uppercase; 
    }

    textarea { 
        width: 100%; 
        height: 95px; 
        padding: 10px; 
        border-radius: 6px; 
        border: none; 
        font-family: inherit; 
        font-size: 0.9rem; 
        box-sizing: border-box; 
        margin-bottom: 15px; 
        background-color: #ecf0f1;
        resize: none;
    }

    /* KONTROLLER - Matchet med Gitter-stil */
    .control-item {
        display: flex; 
        align-items: center; 
        justify-content: space-between;
        background: rgba(0,0,0,0.2); /* Bruker mørkere gjennomsiktighet som i Gitter */
        padding: 10px 12px; 
        border-radius: 8px; 
        margin-bottom: 6px; 
        font-size: 0.9rem;
    }

    /* SWITCHER - Matchet med Gitter */
    .switch { position: relative; display: inline-block; width: 40px; height: 20px; flex-shrink: 0; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider { 
        position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; 
        background-color: #ccc; transition: .4s; border-radius: 20px; 
    }
    .slider:before { 
        position: absolute; content: ""; height: 14px; width: 14px; 
        left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; 
    }
    input:checked + .slider { background-color: var(--accent-green); }
    input:checked + .slider:before { transform: translateX(20px); }

        select, input[type="number"] {
            background: #ecf0f1; border: none; border-radius: 4px; padding: 3px; font-size: 0.8rem; width: 80px;
        }

.action-btn { 
    width: 100%; 
    padding: 10px; 
    border-radius: 8px; 
    border: none; 
    font-weight: 600; 
    cursor: pointer; 
    /* Fjern margin-bottom herfra hvis du vil styre det via rader */
    margin-bottom: 0; 
    color: white; 
    transition: 0.2s;
    box-sizing: border-box; 
    font-size: 0.85rem;
    display: flex;         /* Lagt til for å sentrere tekst perfekt */
    align-items: center;   /* Lagt til */
    justify-content: center; /* Lagt til */
}
        .action-btn:hover { filter: brightness(1.1); transform: translateY(-1px); }
        
        .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-top: 2px; }
        
        .btn-generate { background-color: var(--btn-generate); }
        .btn-reset { background-color: var(--btn-reset); }
        .btn-print { background-color: var(--btn-print); }
        .btn-download { background-color: var(--btn-download); }

        /* ALT UNDER ER NØYAKTIG DIN KODE */
        .main-content { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; align-items: center; padding: 40px; }
        #capture-area { background: white; padding: 40px; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); width: fit-content; }
        
        .grid-container { 
            display: grid; 
            background: white; 
            margin-top: 20px; 
            border: 2px solid var(--grid-border); 
            padding: 0;
            width: fit-content;
        }

        .cell { 
            border: 0.5px solid #ddd; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            user-select: none;
            box-sizing: border-box;
        }

        .cell.solution { background-color: #e8f5e9; font-weight: bold; color: #10b981; border: 0.5px solid #10b981; }
        .cell.empty { color: #ccc; }

        .word-item { background: #f8f9fa; padding: 6px 12px; border: 1px solid #ddd; border-radius: 4px; margin: 5px; display: inline-block; font-size: 1rem; }

        .solution-section {
            margin-top: 40px;
            display: none;
            flex-direction: column;
            align-items: center;
            width: 100%;
            page-break-before: always;
        }

/* Ny stil for feilmelding i rutenett-størrelse */
input#grid-size.invalid {
    background-color: #ff7675;
    color: white;
    font-weight: bold;
}
#main-title {
    font-size: 2.5rem;
    color: #333;
    text-transform: uppercase;
    letter-spacing: 2px;
}

/* HAMBURGER MENY-KNAPP */
.menu-container {
    position: relative;
    margin-bottom: 10px;
}

.hamburger {
    display: flex;
    flex-direction: column;
    gap: 4px;
    cursor: pointer;
    width: 20px;
    padding: 5px;
}

.hamburger span {
    display: block;
    width: 100%;
    height: 2px;
    background-color: white;
    border-radius: 1px;
    transition: 0.3s;
}

.menu-item-disabled {
    opacity: 0.4;            /* Gjør alt 60% gjennomsiktig */
    filter: grayscale(100%); /* Gjør bildet helt grått */
    pointer-events: none;    /* Gjør at man ikke kan klikke på lenken */
    cursor: default;         /* Viser vanlig pil i stedet for pekefinger */
}
/* SELVE MENYEN SOM KOMMER FREM */
.dropdown-menu {
    display: none;
    position: absolute;
    top: 25px;
    left: 0;
    background-color: #2c3e50;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 6px;
    width: 200px;
    z-index: 100;
    box-shadow: 5px 5px 15px rgba(0,0,0,0.5);
}

.menu-icon {
    width: 20px;          /* Størrelsen på bildet */
    height: 20px;
    margin-right: 10px;   /* Avstand fra bilde til tekst */
    vertical-align: middle; /* Sentrerer bildet i forhold til teksten */
    object-fit: contain;  /* Sørger for at bildet ikke blir strukket */
    border-radius: 3px;   /* Valgfritt: runder av hjørnene på bildene litt */
}
.dropdown-menu a {
    display: block;
    color: white;
    padding: 12px 15px;
    text-decoration: none;
    font-size: 0.9rem;
    border-bottom: 1px solid rgba(255,255,255,0.05);
}


.dropdown-menu a:hover {
    background-color: #34495e;
}

/* Viser menyen når man legger til klassen "show" via JS */
.dropdown-menu.show {
    display: block;
}
.sidebar h2 { margin: 0 0 15px 0; font-size: 1.1rem; text-align: center; text-transform: uppercase; }
        @media print {
            .sidebar { display: none !important; }
            body { background: white !important; height: auto; }
            .main-content { padding: 0; }
            #capture-area { box-shadow: none !important; padding: 20px; }
        }
    </style>
</head>
<body>
<div class="sidebar">
    <div class="sidebar-header" style="display: flex; align-items: center; margin-bottom: 20px;">
        <div class="menu-container" style="margin-bottom: 0; margin-right: 15px;">
            <div class="hamburger" onclick="toggleMenu()">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <div id="myDropdown" class="dropdown-menu">
                <a href="https://77tor.github.io/gitter/" target="_self">
                    <img src="gitter_02.png" class="menu-icon"> Gitter-ord
                </a>
                <a href="https://77tor.github.io/ord-sok/" target="_self" class="menu-item-disabled">
                    <img src="ord-sok.png" class="menu-icon"> Ordsøk
                </a>
                <a href="https://77tor.github.io/Silhuettord/" target="_self">
                    <img src="silhuett-ord_05.png" class="menu-icon"> Silhuett-ord
                </a>
            </div>
        </div>
        <h2 style="margin: 0; flex-grow: 1; text-align: center;">Ordsøk</h2>
    </div>

    <textarea id="word-input" placeholder="Skriv ord her..."></textarea>

    <div class="sidebar-controls">
        <div class="control-item">
            <span>Størrelse (5-25)</span>
            <input type="number" id="grid-size" value="12" min="5" max="25" onchange="autoGenerate()">
        </div>

        <div class="control-item">
            <span>Font</span>
            <select id="font-family" onchange="autoGenerate()">
                <option value="'Trykkskrift', sans-serif">Trykkskrift</option>
                <option value="'Skogstavskrift', cursive">Skogstavskrift</option>
                <option value="'Andika', sans-serif">Andika</option>
                <option value="'Courier New', Courier, monospace">Monospace</option>
                <option value="'Comic Sans MS', cursive">Comic Sans</option>
                <option value="Arial, sans-serif">Arial</option>
            </select>
        </div>

        <div class="control-item">
            <span>Retning</span>
            <select id="placement-style" onchange="autoGenerate()">
                <option value="all">Alle veier</option>
                <option value="horizontal">Vannrett</option>
                <option value="vertical">Loddrett</option>
            </select>
        </div>

        <div class="control-item">
            <span>STORE bokstaver</span>
            <label class="switch">
                <input type="checkbox" id="toggle-case" onchange="autoGenerate()">
                <span class="slider"></span>
            </label>
        </div>

        <div class="control-item">
            <span>Begge leseretninger</span>
            <label class="switch">
                <input type="checkbox" id="toggle-direction" onchange="autoGenerate()">
                <span class="slider"></span>
            </label>
        </div>

        <div class="control-item">
            <span>Vis fasit</span>
            <label class="switch">
                <input type="checkbox" id="toggle-solution" onchange="autoGenerate()">
                <span class="slider"></span>
            </label>
        </div>
    </div>

    <div style="margin-top: 10px;">
<div class="main-row" style="display: flex; gap: 10px; margin-bottom: 10px;">
    <button class="action-btn btn-generate" onclick="generatePuzzle()" style="flex: 2; white-space: nowrap;">LAG ORDSØK</button>
    
    <button class="action-btn btn-reset" onclick="resetForm()" style="flex: 1; white-space: nowrap;">NULLSTILL</button>
</div>
        
        <div class="btn-row" style="display: flex; gap: 10px; margin-bottom: 10px;">
            <button class="action-btn btn-print" onclick="window.print()">SKRIV UT</button>
            <button class="action-btn btn-download" onclick="downloadFullImage()">LAST NED BILDE</button>
        </div>
    </div>
</div> 
<div class="main-content">
    <div id="placeholder-image" style="display: flex; justify-content: center; align-items: center; width: 100%; height: 100%;">
        <img src="ord_sok_01.png" alt="Velkomstbilde" style="max-width: 400px; opacity: 0.3; filter: grayscale(100%);">
    </div> 

    <div id="capture-area" style="display: none;">
        <h1 id="main-title" style="text-align: center; margin-top: 0; margin-bottom: 20px;">Ordsøk</h1>
        
        <div id="grid" class="grid-container"></div>
        <div id="word-list-container" style="margin-top:20px; text-align:center;">
            <h3 id="list-header">Finn disse ordene:</h3>
            <div id="word-list"></div>
        </div>
    </div>

    <div id="solution-section" class="solution-section" style="display: none;">
        <h2 style="text-align: center; margin-bottom: 20px;">Fasit</h2>
        <div id="solution-grid" class="grid-container"></div>
    </div>

</div>

<script>
    const ALPHA_UPPER = "ABCDEFGHIJKLMNOPQRSTUVWXYZÆØÅ";
    const ALPHA_LOWER = "abcdefghijklmnopqrstuvwxyzæøå";

    function autoGenerate() {
        const input = document.getElementById('word-input').value.trim();
        if (input.length > 0) generatePuzzle();
    }

function resetForm() { 
    if(confirm("Nullstille alt?")) {
        // 1. Tøm tekstfeltet
        document.getElementById('word-input').value = "";

        // 2. Sett dropdown-menyer og tallfelt til default
        document.getElementById('grid-size').value = "12";
        document.getElementById('font-family').selectedIndex = 0; // Velger første font (Trykkskrift)
        document.getElementById('placement-style').selectedIndex = 0; // Velger "Alle veier"

        // 3. Sett brytere (checkboxes) til av (false)
        document.getElementById('toggle-case').checked = false;
        document.getElementById('toggle-direction').checked = false;
        document.getElementById('toggle-solution').checked = false;

        // 4. Vis velkomstbildet og skjul oppgave/fasit
        document.getElementById('placeholder-image').style.display = 'flex';
        document.getElementById('capture-area').style.display = 'none';
        document.getElementById('solution-section').style.display = 'none';
        
        // Valgfritt: Hvis du vil tømme selve ordsøket som ble generert
        document.getElementById('grid').innerHTML = "";
        document.getElementById('word-list').innerHTML = "";
    }
}

    async function downloadFullImage() {
        const area = document.getElementById('capture-area');
        const btn = document.querySelector('.btn-download');
        
        if (document.getElementById('grid').innerHTML === "") {
            alert("Du må generere et ordsøk først!");
            return;
        }

        btn.innerText = "GENERERER...";
        btn.disabled = true;

        try {
            const canvas = await html2canvas(area, {
                scale: 2,
                backgroundColor: "#ffffff",
                logging: false,
                useCORS: true
            });
            
            const link = document.createElement('a');
            link.download = 'ordsok_oppgave.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        } catch (e) {
            console.error(e);
            alert("Kunne ikke generere bilde. Prøv en annen nettleser.");
        } finally {
            btn.innerText = "LAST NED BILDE";
            btn.disabled = false;
        }
    }

function generatePuzzle() {
        document.getElementById('placeholder-image').style.display = 'none';
        document.getElementById('capture-area').style.display = 'block';
        
        
        const rawInput = document.getElementById('word-input').value;
        const sizeInput = document.getElementById('grid-size');
        let size = parseInt(sizeInput.value) || 12;
        
        const isUpper = document.getElementById('toggle-case').checked;
        const bothDirections = document.getElementById('toggle-direction').checked;
        const showSolution = document.getElementById('toggle-solution').checked;
        const selectedFont = document.getElementById('font-family').value;
        const placementStyle = document.getElementById('placement-style').value;
        
        let words = rawInput.split(/[\s,]+/).filter(w => w.length > 0)
                            .map(w => isUpper ? w.toUpperCase() : w.toLowerCase());

        if (words.length === 0) return;

        let grid = Array(size).fill().map(() => Array(size).fill(''));
        let placedWords = [];

        words.forEach(word => {
            let wordToPlace = (bothDirections && Math.random() > 0.5) 
                ? word.split('').reverse().join('') : word;

            let placed = false;
            let attempts = 0;

            if (word.length <= size) {
                while (!placed && attempts < 400) {
                    let dir = (placementStyle === 'horizontal') ? 0 : (placementStyle === 'vertical' ? 1 : Math.floor(Math.random() * 3));
                    let r = Math.floor(Math.random() * size), c = Math.floor(Math.random() * size);
                    if (canPlace(grid, wordToPlace, r, c, dir, size)) {
                        placeWord(grid, wordToPlace, r, c, dir);
                        placed = true;
                        placedWords.push(word);
                    }
                    attempts++;
                }
            }
        });

        if (placedWords.length < words.length) {
            sizeInput.classList.add('invalid');
        } else {
            sizeInput.classList.remove('invalid');
        }

        const cellSize = Math.min(40, Math.floor(580 / size));
        const activeAlphabet = isUpper ? ALPHA_UPPER : ALPHA_LOWER;

        document.getElementById('list-header').style.fontFamily = selectedFont;
        document.getElementById('main-title').style.fontFamily = selectedFont;
        renderGrid('grid', grid, cellSize, selectedFont, false, activeAlphabet);
        renderGrid('solution-grid', grid, cellSize, selectedFont, true, activeAlphabet);

        // --- NY LOGIKK FOR BREDDE PÅ ORDLISTE ---
        const container = document.getElementById('word-list-container');
        const gridWidth = size * cellSize;
        container.style.width = gridWidth + "px";
        container.style.marginLeft = "auto";
        container.style.marginRight = "auto";
        // ----------------------------------------

        document.getElementById('word-list').innerHTML = placedWords.map(w => 
            `<span class="word-item" style="font-family:${selectedFont}">${w}</span>`
        ).join('');
        
        document.getElementById('solution-section').style.display = showSolution ? 'flex' : 'none';
    }

    function renderGrid(id, grid, size, font, isSolution, alphabet) {
        const el = document.getElementById(id);
        el.style.gridTemplateColumns = `repeat(${grid.length}, ${size}px)`;
        el.innerHTML = '';
        for (let r = 0; r < grid.length; r++) {
            for (let c = 0; c < grid.length; c++) {
                let cell = document.createElement('div');
                cell.className = 'cell';
                const isOccupied = grid[r][c] !== '';
                cell.textContent = isOccupied ? grid[r][c] : alphabet[Math.floor(Math.random() * alphabet.length)];
                if (isSolution && isOccupied) cell.classList.add('solution');
                if (isSolution && !isOccupied) cell.classList.add('empty');
                cell.style.width = cell.style.height = size + "px";
                cell.style.fontFamily = font;
                cell.style.fontSize = (size * 0.6) + "px";
                el.appendChild(cell);
            }
        }
    }

    function canPlace(grid, word, row, col, dir, size) {
        let dr = [0, 1, 1][dir], dc = [1, 0, 1][dir];
        if (row + dr * (word.length - 1) >= size || col + dc * (word.length - 1) >= size) return false;
        for (let i = 0; i < word.length; i++) {
            let r = row + i * dr, c = col + i * dc;
            if (grid[r][c] !== '' && grid[r][c] !== word[i]) return false;
        }
        return true;
    }

    function placeWord(grid, word, row, col, dir) {
        let dr = [0, 1, 1][dir], dc = [1, 0, 1][dir];
        for (let i = 0; i < word.length; i++) grid[row + i * dr][col + i * dc] = word[i];
    }

function toggleMenu() {
    document.getElementById("myDropdown").classList.toggle("show");
}

// Lukker menyen hvis man klikker utenfor den
window.onclick = function(event) {
    if (!event.target.closest('.menu-container')) {
        var dropdowns = document.getElementsByClassName("dropdown-menu");
        for (var i = 0; i < dropdowns.length; i++) {
            var openDropdown = dropdowns[i];
            if (openDropdown.classList.contains('show')) {
                openDropdown.classList.remove('show');
            }
        }
    }
}
</script>
</body>
</html>
